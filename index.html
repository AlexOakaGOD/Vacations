<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Férias 2026</title>
    <style>
        :root { --bg: #0e1117; --card: #161b22; --text: #c9d1d9; --blue: #1f6feb; --red: #f85149; --orange: #e3b341; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--card); padding: 20px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .metric { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .metric-val { font-size: 24px; font-weight: bold; color: white; }
        .period-list { flex-grow: 1; overflow-y: auto; font-size: 14px; }
        .period-item { padding: 8px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        button { cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        .btn-clear { background: var(--red); color: white; padding: 10px; margin-top: 10px; }
        
        /* Main Content */
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #30363d; height: 35px; text-align: center; font-size: 12px; }
        th { background: #21262d; color: #8b949e; font-weight: normal; }
        .month-name { text-align: left; padding-left: 15px; font-weight: bold; width: 120px; background: #21262d; }
        .day { cursor: pointer; transition: 0.1s; }
        .day:hover { filter: brightness(1.5); }
        .weekend { color: var(--orange); background: #2d2400; }
        .holiday { color: var(--red); background: #3d1414; font-weight: bold; }
        .selected { background: var(--blue) !important; color: white !important; font-weight: bold; box-shadow: inset 0 0 8px rgba(255,255,255,0.3); }
        .empty { background: var(--bg); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📊 Gestão 2026</h2>
    <div class="metric">
        <div id="count" class="metric-val">0</div>
        <div style="font-size: 12px; color: #8b949e;">Dias Marcados</div>
    </div>
    <div class="period-list" id="periodList"></div>
    <button class="btn-clear" onclick="clearAll()">🗑️ Limpar Tudo</button>
</div>

<div class="main">
    <h1>Planeamento de Férias 2026</h1>
    <p style="color: #8b949e;">Clica nos dias para marcar ou desmarcar. Os dados são guardados automaticamente.</p>
    <table id="calendar"></table>
</div>

<script>
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-05", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];
    let selecionados = JSON.parse(localStorage.getItem('ferias_2026')) || [];

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name';
            row.cells[0].innerText = nome;
            
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell().className = 'empty';
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell();
                let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate();
                cell.className = 'day';
                
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');
                
                if (selecionados.includes(dStr)) cell.classList.add('selected');
                
                cell.onclick = () => toggleDay(dStr);
                d.setDate(d.getDate() + 1);
            }
            while(row.cells.length < 38) row.insertCell().className = 'empty';
        });
        updateStats();
    }

    function toggleDay(date) {
        if (selecionados.includes(date)) selecionados = selecionados.filter(d => d !== date);
        else selecionados.push(date);
        save();
    }

    function save() {
        localStorage.setItem('ferias_2026', JSON.stringify(selecionados));
        render();
    }

    function clearAll() {
        if(confirm("Limpar todas as seleções?")) { selecionados = []; save(); }
    }

    function updateStats() {
        document.getElementById('count').innerText = selecionados.length;
        const list = document.getElementById('periodList');
        list.innerHTML = "<h3>Períodos:</h3>";
        
        let sorted = [...selecionados].sort();
        if(sorted.length === 0) return;
        
        let start = sorted[0], end = sorted[0];
        for(let i=1; i <= sorted.length; i++) {
            let curr = sorted[i];
            let lastDate = new Date(end);
            lastDate.setDate(lastDate.getDate() + 1);
            
            if(curr === lastDate.toISOString().split('T')[0]) {
                end = curr;
            } else {
                list.innerHTML += `<div class="period-item">📅 ${start.split('-').reverse().slice(0,2).join('/')} a ${end.split('-').reverse().slice(0,2).join('/')}</div>`;
                start = curr; end = curr;
            }
        }
    }

    render();
</script>
</body>
</html>
