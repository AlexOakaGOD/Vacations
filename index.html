<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Variáveis de Cor - Modo Claro (Default) */
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; 
            --border: #d0d7de; --stat-bg: #ffffff;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; 
            --orange: #9a6700;
        }

        /* Variáveis de Cor - Modo Escuro */
        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --border: #30363d; --stat-bg: #0d1117;
            --blue: #1f6feb; --green: #238636; --red: #f85149; 
            --orange: #e3b341;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--card); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; position: relative; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }

        /* Botão Tema */
        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--border); border: none; padding: 5px 10px; border-radius: 20px; font-size: 14px; cursor: pointer; width: auto; color: var(--text); }

        button { cursor: pointer; border-radius: 6px; border: none; padding: 10px; width: 100%; font-weight: bold; transition: 0.2s; margin-bottom: 8px; }
        .btn-google { background: #24292f; color: white; border: 1px solid transparent; }
        [data-theme="light"] .btn-google { background: white; color: #444; border: 1px solid #ddd; }
        
        .btn-save { background: var(--green); color: white; }
        .btn-pdf { background: #8250df; color: white; }
        .btn-logout { background: transparent; color: #8b949e; border: 1px solid var(--border); font-size: 11px; }

        /* Tabela */
        table { border-collapse: collapse; width: 100%; background: var(--card); font-size: 11px; color: var(--text); }
        th, td { border: 1px solid var(--border); height: 32px; text-align: center; min-width: 24px; position: relative; }
        th { background: rgba(0,0,0,0.05); color: #8b949e; }
        .month-name { background: rgba(0,0,0,0.05); text-align: left; padding-left: 10px; font-weight: bold; width: 100px; }
        
        .day { cursor: pointer; }
        .weekend { color: var(--orange); background: rgba(154, 103, 0, 0.05); }
        .holiday { color: var(--red); background: rgba(207, 34, 46, 0.05); }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; text-align: center; }
        .stat-box { background: var(--stat-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; }
        
        .control-btns { display: flex; gap: 4px; margin-top: 5px; }
        .btn-mini { width: 22px; padding: 2px; font-size: 12px; background: var(--border); color: var(--text); margin: 0; }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
        .color-box { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.1); }

        /* PDF: Forçar sempre modo claro para impressão */
        .pdf-export { background: white !important; color: black !important; }
        .pdf-export table, .pdf-export td, .pdf-export th { background: white !important; border-color: #eee !important; color: black !important; }
    </style>
</head>
<body data-theme="light">

<div class="sidebar">
    <button id="themeToggle" class="theme-toggle">🌙</button>
    <div>
        <h2 style="margin-top:0">🏖️ Férias 2026</h2>
        <button id="btnLogin" class="btn-google">Entrar com Google</button>
        <div id="userArea" style="display:none">
            <div id="userInfo" style="font-weight:bold; margin-bottom:10px;"></div>
            <div class="stats-grid">
                <div class="stat-box">
                    <span id="statTotal" class="stat-val">22</span>
                    <span class="stat-lbl">Total</span>
                    <div class="control-btns">
                        <button class="btn-mini" id="btnDec">-</button>
                        <button class="btn-mini" id="btnInc">+</button>
                    </div>
                </div>
                <div class="stat-box"><span id="statUsed" class="stat-val">0</span><span class="stat-lbl">Usados</span></div>
                <div class="stat-box"><span id="statLeft" class="stat-val">22</span><span class="stat-lbl">Faltam</span></div>
            </div>
            <button class="btn-save" id="btnSave">☁️ Guardar Férias</button>
            <button class="btn-pdf" id="btnExport">📄 Baixar PDF</button>
            <div id="status" style="font-size:11px; text-align:center; margin: 5px 0;">Sincronizado</div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;"><div id="legend"></div>
        </div>
    </div>
    <div id="footerSidebar" style="display:none; text-align: center;"><button id="btnLogout" class="btn-logout">Sair da Conta</button></div>
</div>

<div class="main" id="calendar-area"><table id="calendar"></table></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; let todasFerias = {}; let userEmailEncoded = ""; let minhasFerias = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    // Lógica do Tema (Dark/Light)
    const toggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', currentTheme);
    toggle.innerText = currentTheme === 'dark' ? '☀️' : '🌙';

    toggle.onclick = () => {
        let theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggle.innerText = theme === 'dark' ? '☀️' : '🌙';
    };

    function encodeEmail(email) { return email.replace(/\./g, '_'); }

    async function checkAccess(user) {
        const encoded = encodeEmail(user.email);
        const snap = await get(ref(db, 'membros/' + encoded));
        if (snap.exists()) {
            userEmailEncoded = encoded;
            document.getElementById('userArea').style.display = 'block';
            document.getElementById('footerSidebar').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('userInfo').innerText = "👤 " + snap.val().nome;
            onValue(ref(db, 'membros'), (s) => { membros = s.val() || {}; render(); renderLegend(); });
            onValue(ref(db, 'equipa'), (s) => { todasFerias = s.val() || {}; minhasFerias = todasFerias[userEmailEncoded] || []; render(); });
        } else { signOut(auth); }
    }

    function renderLegend() {
        const legend = document.getElementById('legend'); legend.innerHTML = "";
        Object.entries(membros).forEach(([email, d]) => {
            legend.innerHTML += `<div class="legend-item"><div class="color-box" style="background:${d.cor}"></div> ${d.nome}</div>`;
        });
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell(); let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate(); cell.className = 'day';
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');

                let usersNoDia = Object.keys(todasFerias).filter(e => todasFerias[e]?.includes(dStr));
                if (usersNoDia.length === 1) cell.style.background = membros[usersNoDia[0]]?.cor || '';
                else if (usersNoDia.length > 1) {
                    let c1 = membros[usersNoDia[0]]?.cor || '#333'; let c2 = membros[usersNoDia[1]]?.cor || '#666';
                    cell.style.background = `linear-gradient(to bottom left, ${c1} 50%, ${c2} 50%)`;
                }
                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) minhasFerias = minhasFerias.filter(v => v !== dStr);
                    else minhasFerias.push(dStr);
                    todasFerias[userEmailEncoded] = minhasFerias;
                    render();
                };
                d.setDate(d.getDate() + 1);
            }
            while(row.cells.length < 38) row.insertCell();
        });

        const total = membros[userEmailEncoded]?.totalDias !== undefined ? membros[userEmailEncoded].totalDias : 22;
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statUsed').innerText = minhasFerias.length;
        document.getElementById('statLeft').innerText = total - minhasFerias.length;
    }

    document.getElementById('btnInc').onclick = () => ajustarDias(1);
    document.getElementById('btnDec').onclick = () => ajustarDias(-1);

    async function ajustarDias(valor) {
        const totalAtual = membros[userEmailEncoded]?.totalDias !== undefined ? membros[userEmailEncoded].totalDias : 22;
        const novoTotal = totalAtual + valor;
        if(novoTotal < 0) return;
        try { await update(ref(db, `membros/${userEmailEncoded}`), { totalDias: novoTotal }); } 
        catch (e) { alert("Erro ao ajustar dias."); }
    }

    document.getElementById('btnExport').onclick = () => {
        const area = document.getElementById('calendar-area');
        area.classList.add('pdf-export');
        html2pdf().set({ 
            margin: 10, filename: 'Mapa_Ferias_2026.pdf', 
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'landscape' } 
        }).from(area).save().then(() => area.classList.remove('pdf-export'));
    };

    onAuthStateChanged(auth, (u) => { u ? checkAccess(u) : (document.getElementById('userArea').style.display = 'none', document.getElementById('btnLogin').style.display = 'block'); });
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);
    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
        document.getElementById('status').innerText = "✅ Sincronizado!";
    };
    render();
</script>
</body>
</html>
