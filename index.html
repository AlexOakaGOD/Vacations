<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --text: #c9d1d9; 
            --blue: #1f6feb; 
            --green: #238636; 
            --red: #f85149; 
            --orange: #e3b341; 
            --border: #30363d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Estruturada */
        .sidebar { 
            width: 300px; 
            background: var(--card); 
            padding: 20px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }

        /* Botões */
        button { 
            cursor: pointer; 
            border-radius: 6px; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; margin-bottom: 10px; }
        .btn-save { background: var(--green); color: white; margin-bottom: 10px; }
        .btn-save:hover { filter: brightness(1.2); }
        .btn-logout { 
            background: transparent; 
            color: #8b949e; 
            border: 1px solid var(--border); 
            font-size: 12px; 
            margin-top: 15px;
        }
        .btn-logout:hover { color: var(--red); border-color: var(--red); }

        /* Tabela do Calendário */
        table { border-collapse: collapse; width: 100%; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid var(--border); height: 35px; text-align: center; font-size: 11px; min-width: 25px; }
        th { background: #21262d; color: #8b949e; }
        .month-name { background: #21262d; text-align: left; padding-left: 12px; font-weight: bold; width: 110px; }
        
        .day { cursor: pointer; transition: 0.1s; }
        .day:hover { background: rgba(255,255,255,0.05); }
        .weekend { color: var(--orange); background: #2d2400; }
        .holiday { color: var(--red); background: #3d1414; }

        /* Status e Legenda */
        #status { font-size: 12px; text-align: center; margin-bottom: 15px; padding: 6px; border-radius: 4px; background: rgba(0,0,0,0.2); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
        .color-box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }
        
        .count-section { text-align: center; border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div id="top-sidebar">
        <h2 style="margin-top:0">🏖️ Férias 2026</h2>
        
        <button id="btnLogin" class="btn-google">Entrar com Google</button>
        
        <div id="userArea" style="display:none">
            <div id="userInfo" style="margin-bottom:15px; font-weight:bold; font-size: 14px; color: white;"></div>
            <button class="btn-save" id="btnSave">☁️ Guardar Minhas Férias</button>
            <div id="status">Sincronizado</div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
            <div id="legend"></div>
        </div>
    </div>

    <div id="footerSidebar" style="display:none">
        <div class="count-section">
            <div id="count" style="font-size: 48px; font-weight: bold;">0</div>
            <div style="color: #8b949e; font-size: 12px;">Dias Marcados</div>
        </div>
        <button id="btnLogout" class="btn-logout">Sair da Conta</button>
    </div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    // Configuração oficial do teu projeto
    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; 
    let todasFerias = {}; 
    let userEmailEncoded = "";
    let minhasFerias = [];

    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    function encodeEmail(email) { return email.replace(/\./g, '_'); }

    // Verifica se o e-mail está na lista "membros" da Database
    async function checkAccess(user) {
        const encoded = encodeEmail(user.email);
        const snap = await get(ref(db, 'membros/' + encoded));
        
        if (snap.exists()) {
            const allMembrosSnap = await get(ref(db, 'membros'));
            membros = allMembrosSnap.val();
            userEmailEncoded = encoded;
            
            // UI Update
            document.getElementById('userArea').style.display = 'block';
            document.getElementById('footerSidebar').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('userInfo').innerText = "👤 " + snap.val().nome;
            
            // Sincronização em tempo real da pasta "equipa"
            onValue(ref(db, 'equipa'), (snapshot) => {
                todasFerias = snapshot.val() || {};
                minhasFerias = todasFerias[userEmailEncoded] || [];
                render();
            });
            renderLegend();
        } else {
            alert("Acesso negado: O e-mail " + user.email + " não está autorizado na base de dados.");
            signOut(auth);
        }
    }

    function renderLegend() {
        const legend = document.getElementById('legend');
        legend.innerHTML = "<p style='font-size:11px; color:#8b949e; margin-bottom:10px;'>EQUIPA:</p>";
        Object.entries(membros).forEach(([email, dados]) => {
            legend.innerHTML += `<div class="legend-item"><div class="color-box" style="background:${dados.cor}"></div> ${dados.nome}</div>`;
        });
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell();
                let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate();
                cell.className = 'day';
                
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');

                // Pinta os dias com as cores dos membros
                Object.entries(todasFerias).forEach(([email, datas]) => {
                    if (datas && datas.includes(dStr)) {
                        cell.style.backgroundColor = membros[email]?.cor || '#333';
                        cell.style.color = 'white';
                        cell.style.fontWeight = 'bold';
                    }
                });

                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) {
                        minhasFerias = minhasFerias.filter(v => v !== dStr);
                    } else {
                        minhasFerias.push(dStr);
                    }
                    todasFerias[userEmailEncoded] = minhasFerias;
                    document.getElementById('status').innerText = "⚠️ Alterações por guardar";
                    render();
                };
                d.setDate(d.getDate() + 1);
            }
            while(row.cells.length < 38) row.insertCell();
        });
        document.getElementById('count').innerText = minhasFerias.length;
    }

    // Monitor de estado de Autenticação
    onAuthStateChanged(auth, (user) => {
        if (user) {
            checkAccess(user);
        } else {
            document.getElementById('userArea').style.display = 'none';
            document.getElementById('footerSidebar').style.display = 'none';
            document.getElementById('btnLogin').style.display = 'block';
            todasFerias = {};
            minhasFerias = [];
            render();
        }
    });

    // Eventos dos Botões
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);
    
    document.getElementById('btnSave').onclick = async () => {
        if(!userEmailEncoded) return;
        document.getElementById('status').innerText = "⏳ A guardar...";
        try {
            await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
            document.getElementById('status').innerText = "✅ Guardado na Nuvem!";
        } catch (e) {
            alert("Erro ao guardar: " + e.message);
        }
    };

    render();
</script>
</body>
</html>
