<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; --border: #d0d7de;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; --orange: #9a6700;
        }
        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; background: var(--bg); color: var(--text); }

        /* SIDEBAR MAIS PEQUENA (260px em vez de 320px) */
        .sidebar { 
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 260px; 
            background: var(--card); 
            border-right: 1px solid var(--border); 
            padding: 15px;
            overflow-y: auto;
            z-index: 1000;
        }

        /* MAIN AJUSTADA À NOVA SIDEBAR */
        .main { 
            position: absolute;
            top: 0; left: 260px; right: 0; bottom: 0;
            padding: 20px;
            overflow: auto;
            background: var(--bg);
        }

        /* CALENDÁRIO SEM ESMAGAR (Largura fixa por célula) */
        table { 
            border-collapse: collapse; 
            background: var(--card); 
            font-size: 12px;
            table-layout: fixed;
            width: auto; /* Deixa a tabela crescer conforme as células */
        }
        
        th, td { 
            border: 1px solid var(--border); 
            width: 32px; /* LARGURA FIXA PARA NÃO ESMAGAR */
            min-width: 32px;
            height: 35px; 
            text-align: center; 
            position: relative; 
        }

        .month-name { 
            font-weight: bold; 
            text-align: left; 
            padding-left: 8px; 
            width: 80px; 
            min-width: 80px;
            background: rgba(128,128,128,0.1); 
        }
        
        /* BOLA BRANCA NOS FDS/FERIADOS SELECIONADOS */
        .selected-offday::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            z-index: 1;
        }
        /* Garantir que o número fica por cima da bola branca */
        .selected-offday span {
            position: relative;
            z-index: 2;
            color: #000 !important; /* Número preto sobre a bola branca */
        }

        .theme-toggle { position: absolute; top: 15px; right: 15px; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); padding: 5px; border-radius: 6px; text-align: center; }
        .stat-val { display: block; font-size: 14px; font-weight: bold; }
        .stat-lbl { font-size: 7px; color: #8b949e; text-transform: uppercase; }

        .interval-tag { font-size: 10px; padding: 6px; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 4px; margin-bottom: 4px; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 8px; font-weight: bold; width: 100%; font-size: 12px; }
        .btn-save { background: var(--green); color: white; margin-bottom: 8px; }
        .btn-pdf { background: #8250df; color: white; }

        .day { cursor: pointer; }
        .weekend { background: rgba(154, 103, 0, 0.08); color: var(--orange); }
        .holiday { background: rgba(207, 34, 46, 0.08); color: var(--red); font-weight: bold; }
    </style>
</head>
<body data-theme="dark"> <div class="sidebar">
    <div id="themeToggle" class="theme-toggle">☀️</div>
    <h2 style="margin-top:0; font-size: 18px;">Férias 2026</h2>
    
    <div id="userArea">
        <div id="userName" style="font-weight:bold; margin-bottom:10px; color: var(--blue);"></div>
        <div class="stats">
            <div class="stat-box">
                <span id="sTotal" class="stat-val">22</span><span class="stat-lbl">Plafond</span>
                <div style="display:flex; justify-content:center; gap:3px; margin-top:4px;">
                    <button id="btnDec" style="width:18px; height:18px; padding:0;">-</button>
                    <button id="btnInc" style="width:18px; height:18px; padding:0;">+</button>
                </div>
            </div>
            <div class="stat-box"><span id="sUsed" class="stat-val">0</span><span class="stat-lbl">Gastos</span></div>
            <div class="stat-box"><span id="sLeft" class="stat-val">22</span><span class="stat-lbl">Sobra</span></div>
        </div>
        <button class="btn-save" id="btnSave">Guardar Alterações</button>
        <button class="btn-pdf" id="btnExport">Gerar PDF</button>
        <div id="msg" style="font-size:11px; text-align:center; margin-top:8px;"></div>
        <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
        <div id="legendArea"></div>
        <h4 style="font-size:10px; color:#8b949e; text-transform:uppercase;">Os Meus Períodos</h4>
        <div id="intervalList"></div>
    </div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let membros = {}, equipaData = {}, myEmail = "", myDates = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    const isUtil = (dStr) => {
        const [y, m, d] = dStr.split('-').map(Number);
        const dt = new Date(y, m-1, d);
        return dt.getDay() !== 0 && dt.getDay() !== 6 && !FERIADOS.includes(dStr);
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            myEmail = user.email.replace(/\./g, '_');
            onValue(ref(db, 'membros'), s => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), s => { equipaData = s.val() || {}; myDates = equipaData[myEmail] || []; render(); });
        }
    });

    function render() {
        if(!membros[myEmail]) return;
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th class='month-name'>Mês</th>" + Array.from({length:37}, (_,i)=>`<th>${['S','T','Q','Q','S','S','D'][i%7]}</th>`).join('') + "</tr>";
        
        document.getElementById('userName').innerText = "👤 " + (membros[myEmail].nome === "Ines" ? "Inês" : membros[myEmail].nome);
        const total = membros[myEmail].totalDias || 22;
        const gastos = myDates.filter(isUtil).length;
        document.getElementById('sTotal').innerText = total;
        document.getElementById('sUsed').innerText = gastos;
        document.getElementById('sLeft').innerText = total - gastos;

        // Legenda e Intervalos (omitido processamento para brevidade, igual ao anterior)
        
        ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((mNome, mIdx) => {
            const row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = mNome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                const cell = row.insertCell();
                const dStr = `2026-${String(mIdx+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                cell.innerHTML = `<span>${d.getDate()}</span>`; 
                cell.className = 'day';
                
                const isH = FERIADOS.includes(dStr), dw = d.getDay(), isW = (dw===0||dw===6);
                if(isH) cell.classList.add('holiday');
                if(isW) cell.classList.add('weekend');

                const users = Object.keys(equipaData).filter(e => equipaData[e]?.includes(dStr));
                if(users.length > 0) {
                    cell.style.color = "white";
                    // Se for dia de folga (fds/feriado) e estiver selecionado, adiciona bola branca
                    if(isH || isW) cell.classList.add('selected-offday');

                    if(users.length === 1) cell.style.background = membros[users[0]].cor;
                    else if(users.length === 2) cell.style.background = `linear-gradient(135deg, ${membros[users[0]].cor} 50%, ${membros[users[1]].cor} 50%)`;
                    else cell.style.background = `linear-gradient(90deg, ${membros[users[0]].cor} 33%, ${membros[users[1]].cor} 33%, ${membros[users[1]].cor} 66%, ${membros[users[2]].cor} 66%)`;
                }

                cell.onclick = () => {
                    if(myDates.includes(dStr)) myDates = myDates.filter(v => v !== dStr);
                    else {
                        if(isUtil(dStr) && myDates.filter(isUtil).length >= total) return;
                        myDates.push(dStr);
                    }
                    equipaData[myEmail] = myDates; render();
                };
                d.setDate(d.getDate()+1);
            }
            while(row.cells.length < 38) row.insertCell();
        });
    }

    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + myEmail), myDates);
        document.getElementById('msg').innerText = "✅ Guardado!";
        setTimeout(() => document.getElementById('msg').innerText = "", 3000);
    };

    document.getElementById('themeToggle').onclick = () => {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        document.getElementById('themeToggle').innerText = t === 'dark' ? '☀️' : '🌙';
    };
</script>
</body>
</html>
