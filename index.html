<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; 
            --border: #d0d7de; --stat-bg: #ffffff;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; 
            --orange: #9a6700; --toggle-bg: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --border: #30363d; --stat-bg: #0d1117;
            --blue: #1f6feb; --green: #238636; --red: #f85149; 
            --orange: #e3b341; --toggle-bg: #30363d;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--card); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; box-sizing: border-box; overflow-y: auto; }
        .main { flex-grow: 1; padding: 15px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        
        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--toggle-bg); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; z-index: 100; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 10px; width: 100%; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .btn-google { background: #24292f; color: white; }
        [data-theme="light"] .btn-google { background: white; color: #444; border: 1px solid #ddd; }
        .btn-save { background: var(--green); color: white; }
        .btn-pdf { background: #8250df; color: white; }
        .btn-logout { background: transparent; color: #8b949e; border: 1px solid var(--border); font-size: 11px; margin-top: 10px; }

        table { border-collapse: collapse; width: 100%; background: var(--card); font-size: 11px; color: var(--text); table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 7px 0; text-align: center; position: relative; }
        th { background: rgba(128, 128, 128, 0.1); color: #8b949e; font-size: 10px; }
        .month-name { background: rgba(128, 128, 128, 0.15); text-align: left; padding-left: 8px; font-weight: bold; width: 65px; }
        
        .day { cursor: pointer; z-index: 1; }
        .weekend { color: var(--orange) !important; font-weight: bold; }
        .holiday { color: var(--red) !important; font-weight: bold; }
        .weekend:not(.selected) { background-color: rgba(154, 103, 0, 0.08); }
        .holiday:not(.selected) { background-color: rgba(207, 34, 46, 0.08); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .stat-box { background: var(--stat-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; }

        .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .legend-name { display: flex; align-items: center; gap: 8px; }
        .color-dot { width: 10px; height: 10px; border-radius: 2px; }
        .sobra-pill { font-weight: bold; background: var(--toggle-bg); padding: 2px 6px; border-radius: 10px; font-size: 10px; }

        /* LISTA DE PERÍODOS À ESQUERDA */
        .period-list { margin-top: 10px; }
        .period-item { font-size: 10px; padding: 6px; background: var(--stat-bg); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 4px; border-left: 3px solid var(--blue); }
    </style>
</head>
<body data-theme="dark">

<div class="sidebar">
    <div>
        <h2 style="margin-top:0; font-size: 22px;">🏖️ Férias 2026</h2>
        <button id="btnLogin" class="btn-google">Entrar com Google</button>
        
        <div id="userArea" style="display:none">
            <div id="userInfo" style="font-weight:bold; margin-bottom:15px; font-size: 16px;"></div>
            <div class="stats-grid">
                <div class="stat-box">
                    <span id="statTotal" class="stat-val">22</span><span class="stat-lbl">Plafond</span>
                    <div style="display:flex; gap:2px; justify-content:center; margin-top:5px;">
                        <button style="width:22px; height:22px; padding:0; background: var(--toggle-bg); color: var(--text);" id="btnDec">-</button>
                        <button style="width:22px; height:22px; padding:0; background: var(--toggle-bg); color: var(--text);" id="btnInc">+</button>
                    </div>
                </div>
                <div class="stat-box"><span id="statUsed" class="stat-val">0</span><span class="stat-lbl">Gastos</span></div>
                <div class="stat-box"><span id="statLeft" class="stat-val">22</span><span class="stat-lbl">Sobra</span></div>
            </div>
            <button class="btn-save" id="btnSave">Guardar Alterações</button>
            <button class="btn-pdf" id="btnExport">Gerar PDF</button>
            <div id="status" style="font-size:11px; text-align:center; height:15px; margin:5px 0; color: var(--green);"></div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
            <div id="legend"></div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
            <div style="font-size:9px; color:#8b949e; margin-bottom:8px; text-transform: uppercase; font-weight: bold;">OS MEUS PERÍODOS:</div>
            <div id="periodList" class="period-list"></div>
        </div>
    </div>
    <div id="footerSidebar" style="display:none; text-align: center;"><button id="btnLogout" class="btn-logout">Sair</button></div>
</div>

<button id="themeToggle" class="theme-toggle">🌙</button>

<div class="main" id="calendar-area">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; let todasFerias = {}; let userEmailEncoded = ""; let minhasFerias = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    const updateTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); document.getElementById('themeToggle').innerText = t === 'dark' ? '☀️' : '🌙'; };
    updateTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('themeToggle').onclick = () => updateTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

    function isDiaUtil(dStr) {
        const parts = dStr.split('-');
        const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        const dw = d.getDay(); 
        return (dw !== 0 && dw !== 6 && !FERIADOS.includes(dStr));
    }

    function formatarPeriodos(datas) {
        if (!datas || datas.length === 0) return "";
        const sorted = [...datas].sort();
        let periodos = [];
        let start = sorted[0];
        let end = sorted[0];

        for (let i = 1; i <= sorted.length; i++) {
            let current = sorted[i];
            let prevDate = new Date(end);
            let currDate = current ? new Date(current) : null;
            let diff = currDate ? (currDate - prevDate) / (1000 * 60 * 60 * 24) : null;

            if (diff === 1) {
                end = current;
            } else {
                const opt = { weekday: 'short', day: '2-digit', month: '2-digit' };
                const sF = new Date(start).toLocaleDateString('pt-PT', opt);
                const eF = new Date(end).toLocaleDateString('pt-PT', opt);
                periodos.push(start === end ? sF : `${sF} a ${eF}`);
                start = current;
                end = current;
            }
        }
        return periodos.map(p => `<div class="period-item">${p}</div>`).join('');
    }

    async function checkAccess(user) {
        userEmailEncoded = user.email.replace(/\./g, '_');
        const snap = await get(ref(db, 'membros/' + userEmailEncoded));
        if (snap.exists()) {
            document.getElementById('userArea').style.display = 'block';
            document.getElementById('footerSidebar').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('userInfo').innerText = snap.val().nome === "Ines" ? "Inês" : snap.val().nome;
            
            onValue(ref(db, 'membros'), (s) => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), (s) => { todasFerias = s.val() || {}; minhasFerias = todasFerias[userEmailEncoded] || []; render(); });
        } else { signOut(auth); }
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th class='month-name'>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        
        const leg = document.getElementById('legend');
        leg.innerHTML = "<div style='font-size:9px; color:#8b949e; margin-bottom:8px;'>SOBRA DA EQUIPA:</div>";
        Object.entries(membros).forEach(([email, m]) => {
            const sobra = (m.totalDias || 22) - (todasFerias[email] || []).filter(d => isDiaUtil(d)).length;
            leg.innerHTML += `<div class="legend-item"><div class="legend-name"><div class="color-dot" style="background:${m.cor}"></div><span>${m.nome === "Ines" ? "Inês" : m.nome}</span></div><span class="sobra-pill">${sobra}</span></div>`;
        });

        document.getElementById('periodList').innerHTML = formatarPeriodos(minhasFerias);

        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell(); 
                let dStr = `2026-${String(mIdx + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                cell.innerText = d.getDate(); cell.className = 'day';
                
                const dw = d.getDay();
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (dw === 0 || dw === 6) cell.classList.add('weekend');

                let users = Object.keys(todasFerias).filter(e => todasFerias[e]?.includes(dStr));
                if (users.length >= 1) {
                    cell.classList.add('selected');
                    const cores = users.map(u => membros[u]?.cor).filter(c => c);
                    
                    if (cores.length === 1) {
                        cell.style.background = cores[0];
                    } else if (cores.length === 2) {
                        // CORTE DIAGONAL PARA 2 CORES
                        cell.style.background = `linear-gradient(135deg, ${cores[0]} 50%, ${cores[1]} 50%)`;
                    } else if (cores.length >= 3) {
                        // BARRAS HORIZONTAIS PARA 3 OU MAIS CORES
                        cell.style.background = `linear-gradient(to bottom, ${cores[0]} 33.3%, ${cores[1]} 33.3%, ${cores[1]} 66.6%, ${cores[2]} 66.6%)`;
                    }
                }

                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) {
                        minhasFerias = minhasFerias.filter(v => v !== dStr);
                    } else {
                        const uteis = minhasFerias.filter(d => isDiaUtil(d)).length;
                        if (isDiaUtil(dStr) && uteis >= (membros[userEmailEncoded]?.totalDias || 22)) {
                            alert("Limite atingido!"); return;
                        }
                        minhasFerias.push(dStr);
                    }
                    todasFerias[userEmailEncoded] = minhasFerias;
                    render();
                };
                d.setDate(d.getDate() + 1);
            }
            while(row.cells.length < 38) row.insertCell();
        });

        const total = membros[userEmailEncoded]?.totalDias || 22;
        const uteisGastos = minhasFerias.filter(d => isDiaUtil(d)).length;
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statUsed').innerText = uteisGastos;
        document.getElementById('statLeft').innerText = total - uteisGastos;
    }

    document.getElementById('btnInc').onclick = () => ajustarDias(1);
    document.getElementById('btnDec').onclick = () => ajustarDias(-1);
    async function ajustarDias(v) {
        const n = (membros[userEmailEncoded]?.totalDias || 22) + v;
        if(n >= 0) await update(ref(db, `membros/${userEmailEncoded}`), { totalDias: n });
    }

    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
        document.getElementById('status').innerText = "✅ Guardado!";
        setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
    };

    document.getElementById('btnExport').onclick = () => html2pdf().from(document.getElementById('calendar-area')).save('Ferias_2026.pdf');
    onAuthStateChanged(auth, (u) => { u ? checkAccess(u) : (document.getElementById('userArea').style.display='none', document.getElementById('btnLogin').style.display='block'); });
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);
</script>
</body>
</html>
