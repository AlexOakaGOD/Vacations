<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Equipa 2026</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; }
        .sidebar { width: 300px; background: var(--card); padding: 20px; border-right: 1px solid #30363d; overflow-y: auto; }
        .main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 12px; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-google { background: white; color: #444; }
        .btn-save { background: #238636; color: white; }
        
        table { border-collapse: collapse; width: 100%; background: var(--card); }
        td, th { border: 1px solid #30363d; height: 35px; text-align: center; font-size: 11px; position: relative; }
        .month-name { background: #21262d; text-align: left; padding-left: 10px; width: 100px; }
        
        /* Cores dinâmicas serão aplicadas via JS */
        .day { cursor: pointer; transition: 0.1s; }
        .weekend { background: #2d2400; color: #e3b341; }
        .holiday { background: #3d1414; color: #f85149; }
        
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>👥 Equipa 2026</h2>
    <button id="btnLogin" class="btn-google">Entrar com Google</button>
    
    <div id="userArea" style="display:none">
        <div id="userInfo" style="margin-bottom:20px; font-weight:bold; color:white;"></div>
        <button class="btn-save" id="btnSave">☁️ Guardar Minhas Férias</button>
        <div id="legend"></div>
    </div>
    
    <div id="status" style="margin-top:10px; font-size:12px; text-align:center;"></div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; // Lista de emails autorizados e cores
    let todasFerias = {}; // { "email_encoded": ["2026-01-01", ...] }
    let userEmailEncoded = "";
    let minhasFerias = [];

    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    function encodeEmail(email) { return email.replace(/\./g, '_'); }

    async function checkAccess(user) {
        const encoded = encodeEmail(user.email);
        const snap = await get(ref(db, 'membros/' + encoded));
        if (snap.exists()) {
            membros = (await get(ref(db, 'membros'))).val();
            userEmailEncoded = encoded;
            document.getElementById('userArea').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('userInfo').innerText = "Olá, " + snap.val().nome;
            setupSync();
            renderLegend();
        } else {
            alert("Acesso negado. O teu e-mail não está na base de dados.");
            auth.signOut();
        }
    }

    function setupSync() {
        onValue(ref(db, 'equipa'), (snapshot) => {
            todasFerias = snapshot.val() || {};
            minhasFerias = todasFerias[userEmailEncoded] || [];
            render();
        });
    }

    function renderLegend() {
        const legend = document.getElementById('legend');
        legend.innerHTML = "<h4>Legenda:</h4>";
        Object.entries(membros).forEach(([email, dados]) => {
            legend.innerHTML += `<div class="legend-item"><div class="color-box" style="background:${dados.cor}"></div> ${dados.nome}</div>`;
        });
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell();
                let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate();
                cell.className = 'day';
                
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');

                // Pintar dias de todos
                Object.entries(todasFerias).forEach(([email, datas]) => {
                    if (datas.includes(dStr)) {
                        cell.style.background = membros[email]?.cor || '#333';
                        cell.style.color = 'white';
                        cell.style.fontWeight = 'bold';
                    }
                });

                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) minhasFerias = minhasFerias.filter(v => v !== dStr);
                    else minhasFerias.push(dStr);
                    todasFerias[userEmailEncoded] = minhasFerias;
                    render();
                };
                d.setDate(d.getDate() + 1);
            }
        });
    }

    onAuthStateChanged(auth, (user) => { if (user) checkAccess(user); });
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
        document.getElementById('status').innerText = "✅ Guardado!";
    };

    render();
</script>
</body>
</html>
