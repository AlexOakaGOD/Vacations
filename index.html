<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d;
            --blue: #1f6feb; --green: #238636; --red: #f85149; --orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

        .sidebar { 
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 230px; 
            background: var(--card); 
            border-right: 1px solid var(--border); 
            padding: 12px;
            overflow-y: auto;
            z-index: 1000;
        }

        .main { 
            position: absolute;
            top: 0; left: 230px; right: 0; bottom: 0;
            padding: 8px;
            background: var(--bg);
            display: flex;
            align-items: center;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            height: 96vh; /* Ajusta para caber verticalmente */
            table-layout: fixed;
            background: var(--card); 
        }
        
        th, td { border: 1px solid var(--border); text-align: center; padding: 0; font-size: 10px; }
        .month-name { font-weight: bold; text-align: left; padding-left: 5px; width: 50px; background: rgba(255,255,255,0.05); }
        
        /* CORES DOS DIAS ESPECIAIS */
        .weekend { color: var(--orange) !important; font-weight: bold; background: rgba(227, 179, 65, 0.1); }
        .holiday { color: var(--red) !important; font-weight: bold; background: rgba(248, 81, 73, 0.1); }

        .theme-toggle { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin: 10px 0; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); padding: 4px; border-radius: 4px; text-align: center; }
        .stat-val { display: block; font-size: 13px; font-weight: bold; }
        .stat-lbl { font-size: 7px; color: #8b949e; text-transform: uppercase; }

        .interval-tag { font-size: 9px; padding: 5px; background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 4px; margin-bottom: 3px; }
        
        button { cursor: pointer; border-radius: 4px; border: none; padding: 6px; font-weight: bold; width: 100%; font-size: 11px; color: white; }
        .btn-save { background: var(--green); margin-bottom: 5px; }
        .btn-pdf { background: #8250df; }
        
        .day { cursor: pointer; transition: filter 0.2s; }
        .day:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="sidebar">
    <div id="themeToggle" class="theme-toggle">☀️</div>
    <h3 style="margin:0 0 10px 0; font-size: 16px;">Férias 2026</h3>
    
    <div id="userArea">
        <div id="userName" style="font-weight:bold; margin-bottom:8px; font-size: 14px; color: var(--blue);"></div>
        <div class="stats">
            <div class="stat-box">
                <span id="sTotal" class="stat-val">-</span><span class="stat-lbl">Plafond</span>
                <div style="display:flex; justify-content:center; gap:2px; margin-top:2px;">
                    <button id="btnDec" style="width:16px; height:16px; padding:0; background:#30363d;">-</button>
                    <button id="btnInc" style="width:16px; height:16px; padding:0; background:#30363d;">+</button>
                </div>
            </div>
            <div class="stat-box"><span id="sUsed" class="stat-val">-</span><span class="stat-lbl">Gastos</span></div>
            <div class="stat-box"><span id="sLeft" class="stat-val">-</span><span class="stat-lbl">Sobra</span></div>
        </div>
        <button class="btn-save" id="btnSave">Guardar</button>
        <button class="btn-pdf" id="btnExport">PDF</button>
        
        <hr style="border:0; border-top:1px solid var(--border); margin: 12px 0;">
        <div id="legendArea"></div>
        <p style="font-size:8px; color:#8b949e; text-transform:uppercase; margin: 10px 0 5px 0; font-weight:bold;">Os Meus Períodos</p>
        <div id="intervalList"></div>
    </div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let membros = {}, equipaData = {}, myEmail = "", myDates = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    const isUtil = (dStr) => {
        const [y, m, d] = dStr.split('-').map(Number);
        const dt = new Date(y, m-1, d);
        return dt.getDay() !== 0 && dt.getDay() !== 6 && !FERIADOS.includes(dStr);
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            myEmail = user.email.replace(/\./g, '_');
            onValue(ref(db, 'membros'), s => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), s => { equipaData = s.val() || {}; myDates = equipaData[myEmail] || []; render(); });
        }
    });

    function render() {
        if(!membros[myEmail]) return;
        
        // Atualiza Sidebar
        document.getElementById('userName').innerText = "👤 " + (membros[myEmail].nome === "Ines" ? "Inês" : membros[myEmail].nome);
        const total = membros[myEmail].totalDias || 22;
        const gastos = myDates.filter(isUtil).length;
        document.getElementById('sTotal').innerText = total;
        document.getElementById('sUsed').innerText = gastos;
        document.getElementById('sLeft').innerText = total - gastos;

        // Legenda Equipa
        const leg = document.getElementById('legendArea'); leg.innerHTML = "";
        Object.entries(membros).forEach(([email, m]) => {
            const sobra = (m.totalDias || 22) - (equipaData[email] || []).filter(isUtil).length;
            leg.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px;"><span><span style="display:inline-block; width:8px; height:8px; background:${m.cor}; border-radius:2px; margin-right:5px;"></span>${m.nome === 'Ines' ? 'Inês' : m.nome}</span><b>${sobra}</b></div>`;
        });

        // Tabela
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th class='month-name'>Mês</th>" + Array.from({length:37}, (_,i)=>`<th>${['S','T','Q','Q','S','S','D'][i%7]}</th>`).join('') + "</tr>";
        
        ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((mNome, mIdx) => {
            const row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = mNome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                const cell = row.insertCell();
                const dStr = `2026-${String(mIdx+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                cell.innerText = d.getDate();
                cell.className = 'day';
                
                const isH = FERIADOS.includes(dStr), dw = d.getDay(), isW = (dw===0||dw===6);
                if(isH) cell.classList.add('holiday');
                else if(isW) cell.classList.add('weekend');

                const users = Object.keys(equipaData).filter(e => equipaData[e]?.includes(dStr));
                if(users.length > 0) {
                    if(users.length === 1) cell.style.background = membros[users[0]].cor;
                    else if(users.length === 2) cell.style.background = `linear-gradient(135deg, ${membros[users[0]].cor} 50%, ${membros[users[1]].cor} 50%)`;
                    else cell.style.background = `linear-gradient(90deg, ${membros[users[0]].cor} 33%, ${membros[users[1]].cor} 33%, ${membros[users[1]].cor} 66%, ${membros[users[2]].cor} 66%)`;
                    
                    // Se for feriado ou fds, o número fica branco ou mantém a cor de alerta para destacar
                    cell.style.color = "white"; 
                }

                cell.onclick = () => {
                    if(myDates.includes(dStr)) myDates = myDates.filter(v => v !== dStr);
                    else {
                        if(isUtil(dStr) && myDates.filter(isUtil).length >= total) return;
                        myDates.push(dStr);
                    }
                    equipaData[myEmail] = myDates; render();
                };
                d.setDate(d.getDate()+1);
            }
            while(row.cells.length < 38) row.insertCell();
        });
    }

    document.getElementById('btnSave').onclick = async () => { await set(ref(db, 'equipa/' + myEmail), myDates); alert("Guardado!"); };
    document.getElementById('btnInc').onclick = () => changePlafond(1);
    document.getElementById('btnDec').onclick = () => changePlafond(-1);
    async function changePlafond(val) {
        const novo = (membros[myEmail]?.totalDias || 22) + val;
        if(novo >= 0) await update(ref(db, 'membros/' + myEmail), { totalDias: novo });
    }
</script>
</body>
</html>
