<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Definição de cores para ambos os temas */
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; 
            --border: #d0d7de; --stat-bg: #ffffff;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; 
            --orange: #9a6700; --toggle-bg: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --border: #30363d; --stat-bg: #0d1117;
            --blue: #1f6feb; --green: #238636; --red: #f85149; 
            --orange: #e3b341; --toggle-bg: #30363d;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        .sidebar { 
            width: 280px; min-width: 280px; max-width: 280px; 
            background: var(--card); padding: 20px; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; box-sizing: border-box; overflow-y: auto; 
        }

        .main { flex-grow: 1; padding: 20px; overflow: auto; display: flex; flex-direction: column; }

        /* Botão Sol/Lua */
        .theme-toggle { 
            position: fixed; top: 15px; right: 15px; 
            background: var(--toggle-bg); border: 1px solid var(--border); 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; 
            color: var(--text); display: flex; align-items: center; justify-content: center; z-index: 1000; 
        }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 10px; width: 100%; font-weight: bold; margin-bottom: 8px; }
        .btn-save { background: var(--green); color: white; }
        .btn-pdf { background: #8250df; color: white; }
        .btn-logout { background: transparent; color: #8b949e; border: 1px solid var(--border); font-size: 11px; margin-top: auto; }

        table { border-collapse: collapse; width: 100%; min-width: 900px; background: var(--card); font-size: 11px; color: var(--text); table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 8px 0; text-align: center; }
        .month-name { background: rgba(128, 128, 128, 0.15); text-align: left; padding-left: 8px; font-weight: bold; width: 65px; }
        
        .day { cursor: pointer; }
        .weekend { color: var(--orange) !important; font-weight: bold; }
        .holiday { color: var(--red) !important; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .stat-box { background: var(--stat-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; }

        .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .legend-name { display: flex; align-items: center; gap: 8px; }
        .color-dot { width: 10px; height: 10px; border-radius: 2px; }
        .sobra-pill { font-weight: bold; background: var(--toggle-bg); padding: 2px 6px; border-radius: 10px; font-size: 10px; }

        .period-list { margin-top: 15px; }
        .period-item { font-size: 10px; padding: 8px; background: var(--stat-bg); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 5px; border-left: 3px solid var(--blue); }
    </style>
</head>
<body data-theme="dark">

<button id="themeToggle" class="theme-toggle">☀️</button>

<div class="sidebar">
    <h2 style="margin-top:0;">🏖️ Férias 2026</h2>
    <div id="userArea">
        <div id="userInfo" style="font-weight:bold; margin-bottom:15px;"></div>
        <div class="stats-grid">
            <div class="stat-box">
                <span id="statTotal" class="stat-val">22</span><span class="stat-lbl">Plafond</span>
                <div style="display:flex; gap:2px; justify-content:center; margin-top:5px;">
                    <button id="btnDec" style="width:20px; padding:2px;">-</button>
                    <button id="btnInc" style="width:20px; padding:2px;">+</button>
                </div>
            </div>
            <div class="stat-box"><span id="statUsed" class="stat-val">0</span><span class="stat-lbl">Gastos</span></div>
            <div class="stat-box"><span id="statLeft" class="stat-val">22</span><span class="stat-lbl">Sobra</span></div>
        </div>
        <button class="btn-save" id="btnSave">Guardar</button>
        <button class="btn-pdf" id="btnExport">PDF</button>
        <div id="status"></div>
        <div id="legend"></div>
        <div id="periodList" class="period-list"></div>
    </div>
    <button id="btnLogout" class="btn-logout">Sair</button>
</div>

<div class="main" id="calendar-area">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; let todasFerias = {}; let userEmailEncoded = ""; let minhasFerias = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    // FUNÇÃO DO TEMA CORRIGIDA
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.onclick = () => {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        themeBtn.innerText = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', next);
    };
    // Carregar preferência salva
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    themeBtn.innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    function isDiaUtil(dStr) {
        const d = new Date(dStr + "T00:00:00");
        return (d.getDay() !== 0 && d.getDay() !== 6 && !FERIADOS.includes(dStr));
    }

    async function checkAccess(user) {
        userEmailEncoded = user.email.replace(/\./g, '_');
        const snap = await get(ref(db, 'membros/' + userEmailEncoded));
        if (snap.exists()) {
            document.getElementById('userInfo').innerText = "👤 " + snap.val().nome;
            onValue(ref(db, 'membros'), s => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), s => { todasFerias = s.val() || {}; minhasFerias = todasFerias[userEmailEncoded] || []; render(); });
        } else { signOut(auth); }
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th class='month-name'>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        
        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell(); 
                let dStr = `2026-${String(mIdx + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                cell.innerText = d.getDate(); cell.className = 'day';
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');

                let usersInDay = Object.keys(todasFerias).filter(e => todasFerias[e]?.includes(dStr));
                if (usersInDay.length > 0) {
                    const cores = usersInDay.map(u => membros[u]?.cor);
                    if (cores.length === 1) cell.style.backgroundColor = cores[0];
                    else if (cores.length === 2) cell.style.background = `linear-gradient(135deg, ${cores[0]} 50%, ${cores[1]} 50%)`;
                    else cell.style.background = `linear-gradient(to right, ${cores[0]} 33%, ${cores[1]} 33%, ${cores[1]} 66%, ${cores[2]} 66%)`;
                    if (isDiaUtil(dStr)) cell.style.color = 'white';
                }

                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) { minhasFerias = minhasFerias.filter(v => v !== dStr); } 
                    else {
                        if (isDiaUtil(dStr) && minhasFerias.filter(v => isDiaUtil(v)).length >= (membros[userEmailEncoded]?.totalDias || 22)) return;
                        minhasFerias.push(dStr);
                    }
                    todasFerias[userEmailEncoded] = minhasFerias; render();
                };
                d.setDate(d.getDate() + 1);
            }
        });
        document.getElementById('statTotal').innerText = membros[userEmailEncoded]?.totalDias || 22;
        document.getElementById('statUsed').innerText = minhasFerias.filter(d => isDiaUtil(d)).length;
        document.getElementById('statLeft').innerText = (membros[userEmailEncoded]?.totalDias || 22) - minhasFerias.filter(d => isDiaUtil(d)).length;
    }

    document.getElementById('btnInc').onclick = () => ajustarDias(1);
    document.getElementById('btnDec').onclick = () => ajustarDias(-1);
    async function ajustarDias(v) {
        const n = (membros[userEmailEncoded]?.totalDias || 22) + v;
        if(n >= 0) await update(ref(db, `membros/${userEmailEncoded}`), { totalDias: n });
    }

    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
        alert("Guardado!");
    };

    onAuthStateChanged(auth, u => u ? checkAccess(u) : signInWithPopup(auth, provider));
    document.getElementById('btnLogout').onclick = () => signOut(auth);
</script>
</body>
</html>
