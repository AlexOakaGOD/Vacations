<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; 
            --border: #d0d7de; --stat-bg: #ffffff;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; 
            --orange: #9a6700; --toggle-bg: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --border: #30363d; --stat-bg: #0d1117;
            --blue: #1f6feb; --green: #238636; --red: #f85149; 
            --orange: #e3b341; --toggle-bg: #30363d;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; transition: 0.2s; }
        .sidebar { width: 300px; background: var(--card); padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; position: relative; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; }
        
        .theme-toggle { position: absolute; top: 18px; right: 20px; background: var(--toggle-bg); border: 1px solid var(--border); padding: 6px 12px; border-radius: 50px; cursor: pointer; color: var(--text); z-index: 100; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 10px; width: 100%; font-weight: bold; margin-bottom: 8px; }
        .btn-google { background: #24292f; color: white; }
        [data-theme="light"] .btn-google { background: white; color: #444; border: 1px solid #ddd; }
        .btn-save { background: var(--green); color: white; }
        .btn-pdf { background: #8250df; color: white; }
        .btn-logout { background: transparent; color: #8b949e; border: 1px solid var(--border); font-size: 11px; }

        /* Tabela Adaptativa */
        #calendar-container { background: transparent; padding: 10px; }
        table { border-collapse: collapse; width: 100%; background: var(--card); font-size: 10px; color: var(--text); table-layout: fixed; }
        th, td { border: 1px solid var(--border); height: 28px; text-align: center; position: relative; }
        th { background: rgba(0,0,0,0.05); color: #8b949e; }
        .month-name { background: rgba(0,0,0,0.05); text-align: left; padding-left: 5px; font-weight: bold; width: 80px; }
        
        .day { cursor: pointer; }
        .weekend { background: rgba(154, 103, 0, 0.1) !important; color: var(--orange); }
        .holiday { background: rgba(207, 34, 46, 0.1) !important; color: var(--red); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .stat-box { background: var(--stat-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; }

        /* Classe especial para o PDF (Forçada via JS) */
        .pdf-print-mode { background: white !important; color: black !important; }
        .pdf-print-mode table { background: white !important; color: black !important; border-color: #ccc !important; }
        .pdf-print-mode th, .pdf-print-mode td { border-color: #ccc !important; color: black !important; }
    </style>
</head>
<body data-theme="light">

<div class="sidebar">
    <button id="themeToggle" class="theme-toggle">🌙</button>
    <div>
        <h2 style="margin-top:0">🏖️ Férias 2026</h2>
        <button id="btnLogin" class="btn-google">Entrar com Google</button>
        <div id="userArea" style="display:none">
            <div id="userInfo" style="font-weight:bold; margin-bottom:15px;"></div>
            <div class="stats-grid">
                <div class="stat-box">
                    <span id="statTotal" class="stat-val">22</span>
                    <span class="stat-lbl">Total</span>
                    <div style="display:flex; gap:2px; justify-content:center; margin-top:5px;">
                        <button style="width:20px; padding:2px; margin:0; font-size:10px;" id="btnDec">-</button>
                        <button style="width:20px; padding:2px; margin:0; font-size:10px;" id="btnInc">+</button>
                    </div>
                </div>
                <div class="stat-box"><span id="statUsed" class="stat-val">0</span><span class="stat-lbl">Úteis</span></div>
                <div class="stat-box"><span id="statLeft" class="stat-val">22</span><span class="stat-lbl">Restam</span></div>
            </div>
            <button class="btn-save" id="btnSave">☁️ Guardar</button>
            <button class="btn-pdf" id="btnExport">📄 Baixar PDF</button>
            <div id="status" style="font-size:11px; text-align:center; margin:5px 0;">Sincronizado</div>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;"><div id="legend"></div>
        </div>
    </div>
    <div id="footerSidebar" style="display:none; text-align: center;"><button id="btnLogout" class="btn-logout">Sair</button></div>
</div>

<div class="main">
    <div id="calendar-area">
        <h2 id="pdf-h" style="display:none; color:black;">Mapa de Férias 2026</h2>
        <table id="calendar"></table>
        <div id="pdf-leg" style="display:none; margin-top:15px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}; let todasFerias = {}; let userEmailEncoded = ""; let minhasFerias = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    // Lógica de Tema
    const tgl = document.getElementById('themeToggle');
    const setTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); tgl.innerText = t === 'dark' ? '☀️' : '🌙'; };
    setTheme(localStorage.getItem('theme') || 'light');
    tgl.onclick = () => setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

    function isDiaUtil(dStr) {
        const d = new Date(dStr);
        return d.getDay() !== 0 && d.getDay() !== 6 && !FERIADOS.includes(dStr);
    }

    async function checkAccess(user) {
        userEmailEncoded = user.email.replace(/\./g, '_');
        const snap = await get(ref(db, 'membros/' + userEmailEncoded));
        if (snap.exists()) {
            document.getElementById('userArea').style.display = 'block';
            document.getElementById('footerSidebar').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('userInfo').innerText = "👤 " + snap.val().nome;
            onValue(ref(db, 'membros'), (s) => { membros = s.val() || {}; renderLegend(); render(); });
            onValue(ref(db, 'equipa'), (s) => { todasFerias = s.val() || {}; minhasFerias = todasFerias[userEmailEncoded] || []; render(); });
        } else { signOut(auth); }
    }

    function renderLegend() {
        const leg = document.getElementById('legend');
        leg.innerHTML = "";
        Object.values(membros).forEach(m => {
            leg.innerHTML += `<div style="display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:3px;"><div style="width:10px;height:10px;background:${m.cor};border-radius:2px;"></div>${m.nome}</div>`;
        });
    }

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        
        let uteisGastos = 0;
        minhasFerias.forEach(d => { if(isDiaUtil(d)) uteisGastos++; });

        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell(); 
                let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate(); cell.className = 'day';
                
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');

                let users = Object.keys(todasFerias).filter(e => todasFerias[e]?.includes(dStr));
                if (users.length === 1) cell.style.backgroundColor = membros[users[0]]?.cor || '';
                else if (users.length > 1) {
                    cell.style.background = `linear-gradient(135deg, ${membros[users[0]].cor} 50%, ${membros[users[1]].cor} 50%)`;
                } else { cell.style.background = ""; cell.style.backgroundColor = ""; }

                cell.onclick = () => {
                    if (minhasFerias.includes(dStr)) {
                        minhasFerias = minhasFerias.filter(v => v !== dStr);
                    } else {
                        if (isDiaUtil(dStr) && uteisGastos >= (membros[userEmailEncoded]?.totalDias || 22)) {
                            alert("Plafond de dias úteis esgotado!"); return;
                        }
                        minhasFerias.push(dStr);
                    }
                    todasFerias[userEmailEncoded] = minhasFerias;
                    render();
                };
                d.setDate(d.getDate() + 1);
            }
            while(row.cells.length < 38) row.insertCell();
        });

        const total = membros[userEmailEncoded]?.totalDias || 22;
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statUsed').innerText = uteisGastos;
        document.getElementById('statLeft').innerText = total - uteisGastos;
    }

    document.getElementById('btnInc').onclick = () => ajustarDias(1);
    document.getElementById('btnDec').onclick = () => ajustarDias(-1);
    async function ajustarDias(v) {
        const n = (membros[userEmailEncoded]?.totalDias || 22) + v;
        if(n >= 0) await update(ref(db, `membros/${userEmailEncoded}`), { totalDias: n });
    }

    document.getElementById('btnExport').onclick = async () => {
        const el = document.getElementById('calendar-area');
        const leg = document.getElementById('pdf-leg');
        leg.innerHTML = "<strong>Legenda: </strong>" + document.getElementById('legend').innerHTML;
        
        // Ativar modo PDF (Fundo branco temporário)
        document.getElementById('pdf-h').style.display = 'block';
        leg.style.display = 'block';
        el.classList.add('pdf-print-mode');

        await html2pdf().set({ margin: 10, filename: 'Ferias_2026.pdf', html2canvas: { scale: 2 }, jsPDF: { orientation: 'landscape' } }).from(el).save();
        
        // Resetar para o tema atual
        el.classList.remove('pdf-print-mode');
        document.getElementById('pdf-h').style.display = 'none';
        leg.style.display = 'none';
    };

    onAuthStateChanged(auth, (u) => { u ? checkAccess(u) : (document.getElementById('userArea').style.display = 'none', document.getElementById('btnLogin').style.display = 'block'); });
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);
    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + userEmailEncoded), minhasFerias);
        document.getElementById('status').innerText = "✅ Guardado!";
    };
</script>
</body>
</html>
