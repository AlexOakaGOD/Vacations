<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d;
            --blue: #1f6feb; --green: #238636; --red: #f85149; --orange: #e3b341;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; background: var(--bg); color: var(--text); }

        .sidebar { 
            position: absolute; top: 0; left: 0; bottom: 0; width: 230px; 
            background: var(--card); border-right: 1px solid var(--border); 
            padding: 15px; overflow-y: auto; z-index: 1000;
        }

        .main { 
            position: absolute; top: 0; left: 230px; right: 0; bottom: 0;
            padding: 10px; background: var(--bg); overflow: auto;
        }

        table { 
            border-collapse: collapse; width: 100%; table-layout: fixed;
            background: var(--card); border: 1px solid var(--border);
        }
        
        /* Altura fixa para evitar que as linhas se esmaguem */
        th, td { 
            border: 1px solid var(--border); text-align: center; 
            height: 38px; min-height: 38px; font-size: 11px; position: relative;
        }
        
        .month-name { font-weight: bold; text-align: left; padding-left: 8px; width: 60px; background: rgba(255,255,255,0.05); }
        
        /* Cores de fim de semana e feriado (apenas no texto quando ocupado) */
        .txt-weekend { color: var(--orange) !important; font-weight: bold; }
        .txt-holiday { color: var(--red) !important; font-weight: bold; }
        
        /* Fundo padrão para dias vazios */
        .bg-weekend { background: rgba(227, 179, 65, 0.1); }
        .bg-holiday { background: rgba(248, 81, 73, 0.1); }

        /* Estilos Sidebar */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 15px 0; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); padding: 5px; border-radius: 4px; text-align: center; }
        .stat-val { display: block; font-size: 14px; font-weight: bold; }
        .stat-lbl { font-size: 7px; color: #8b949e; text-transform: uppercase; }
        
        button { cursor: pointer; border-radius: 4px; border: none; padding: 8px; font-weight: bold; width: 100%; font-size: 11px; color: white; }
        .btn-save { background: var(--green); margin-bottom: 5px; }
        .btn-dec, .btn-inc { width: 20px; height: 20px; padding: 0; background: #30363d; }
        
        .day { cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="margin:0 0 10px 0;">Férias 2026</h3>
    <div id="userArea">
        <div id="userName" style="font-weight:bold; margin-bottom:10px; color: var(--blue);">...</div>
        <div class="stats">
            <div class="stat-box">
                <span id="sTotal" class="stat-val">22</span><span class="stat-lbl">Plafond</span>
                <div style="display:flex; justify-content:center; gap:4px; margin-top:4px;">
                    <button class="btn-dec" onclick="changePlafond(-1)">-</button>
                    <button class="btn-inc" onclick="changePlafond(1)">+</button>
                </div>
            </div>
            <div class="stat-box"><span id="sUsed" class="stat-val">0</span><span class="stat-lbl">Gastos</span></div>
            <div class="stat-box"><span id="sLeft" class="stat-val">22</span><span class="stat-lbl">Sobra</span></div>
        </div>
        <button class="btn-save" onclick="saveData()">Guardar Alterações</button>
        <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
        <div id="legendArea"></div>
    </div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let membros = {}, equipaData = {}, myEmail = "", myDates = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    const isUtil = (dStr) => {
        const [y, m, d] = dStr.split('-').map(Number);
        const dt = new Date(y, m-1, d);
        return dt.getDay() !== 0 && dt.getDay() !== 6 && !FERIADOS.includes(dStr);
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            myEmail = user.email.replace(/\./g, '_');
            onValue(ref(db, 'membros'), s => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), s => { equipaData = s.val() || {}; myDates = equipaData[myEmail] || []; render(); });
        }
    });

    window.changePlafond = (val) => {
        const novo = (membros[myEmail]?.totalDias || 22) + val;
        if(novo >= 0) update(ref(db, 'membros/' + myEmail), { totalDias: novo });
    };

    window.saveData = () => {
        set(ref(db, 'equipa/' + myEmail), myDates);
        alert("Guardado com sucesso!");
    };

    function render() {
        if(!membros[myEmail]) return;
        
        // Stats
        document.getElementById('userName').innerText = "👤 " + (membros[myEmail].nome === "Ines" ? "Inês" : membros[myEmail].nome);
        const total = membros[myEmail].totalDias || 22;
        const gastos = myDates.filter(isUtil).length;
        document.getElementById('sTotal').innerText = total;
        document.getElementById('sUsed').innerText = gastos;
        document.getElementById('sLeft').innerText = total - gastos;

        // Legenda
        const leg = document.getElementById('legendArea'); leg.innerHTML = "";
        Object.entries(membros).forEach(([email, m]) => {
            const sobra = (m.totalDias || 22) - (equipaData[email] || []).filter(isUtil).length;
            leg.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:5px;"><span><span style="display:inline-block; width:10px; height:10px; background:${m.cor}; border-radius:2px; margin-right:5px;"></span>${m.nome === 'Ines' ? 'Inês' : m.nome}</span><b>${sobra}</b></div>`;
        });

        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th class='month-name'>Mês</th>" + Array.from({length:37}, (_,i)=>`<th>${['S','T','Q','Q','S','S','D'][i%7]}</th>`).join('') + "</tr>";
        
        ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((mNome, mIdx) => {
            const row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = mNome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                const cell = row.insertCell();
                const dStr = `2026-${String(mIdx+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                cell.innerText = d.getDate();
                cell.className = 'day';
                
                const isH = FERIADOS.includes(dStr), dw = d.getDay(), isW = (dw===0||dw===6);
                
                // Aplicar cor do texto (laranja/vermelho)
                if(isH) cell.classList.add('txt-holiday');
                else if(isW) cell.classList.add('txt-weekend');

                // Lógica de divisão de cores (Gradiente Vertical)
                const usersPresent = Object.keys(membros).filter(e => equipaData[e]?.includes(dStr));
                
                if(usersPresent.length > 0) {
                    if(usersPresent.length === 1) {
                        cell.style.background = membros[usersPresent[0]].cor;
                    } else if(usersPresent.length === 2) {
                        cell.style.background = `linear-gradient(to right, ${membros[usersPresent[0]].cor} 50%, ${membros[usersPresent[1]].cor} 50%)`;
                    } else {
                        cell.style.background = `linear-gradient(to right, ${membros[usersPresent[0]].cor} 33.3%, ${membros[usersPresent[1]].cor} 33.3%, ${membros[usersPresent[1]].cor} 66.6%, ${membros[usersPresent[2]].cor} 66.6%)`;
                    }
                    cell.style.color = "white"; // Para contraste, mas as classes txt-holiday/weekend aplicam !important se existirem
                } else {
                    // Se estiver vazio, aplica o fundo suave de fds/feriado
                    if(isH) cell.classList.add('bg-holiday');
                    else if(isW) cell.classList.add('bg-weekend');
                }

                cell.onclick = () => {
                    if(myDates.includes(dStr)) myDates = myDates.filter(v => v !== dStr);
                    else {
                        if(isUtil(dStr) && myDates.filter(isUtil).length >= total) return;
                        myDates.push(dStr);
                    }
                    render();
                };
                d.setDate(d.getDate()+1);
            }
            while(row.cells.length < 38) row.insertCell();
        });
    }
</script>
</body>
</html>
