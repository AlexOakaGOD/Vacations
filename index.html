<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias Equipa 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --card: #f6f8fa; --text: #24292f; --border: #d0d7de;
            --blue: #0969da; --green: #1a7f37; --red: #cf222e; --orange: #9a6700;
        }
        [data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL FIXA - RESOLVE O "QUEBRADO" */
        .sidebar { 
            width: 320px; 
            min-width: 320px; 
            background: var(--card); 
            padding: 20px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; /* Scroll apenas na barra se o conteúdo for longo */
            position: relative; 
            box-sizing: border-box; 
            z-index: 10;
        }

        /* ÁREA DO CALENDÁRIO COM SCROLL HORIZONTAL */
        .main { 
            flex-grow: 1; 
            padding: 20px; 
            overflow: auto; /* Permite scroll vertical e horizontal */
            background: var(--bg);
        }
        
        .theme-toggle { position: absolute; top: 15px; right: 15px; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; }
        
        table { border-collapse: collapse; min-width: 1000px; background: var(--card); font-size: 11px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); height: 35px; text-align: center; position: relative; }
        .month-name { font-weight: bold; text-align: left; padding-left: 10px; width: 100px; background: rgba(128,128,128,0.1); }
        
        .day { cursor: pointer; }
        .weekend { background: rgba(154, 103, 0, 0.05); color: var(--orange); }
        .holiday { background: rgba(207, 34, 46, 0.05); color: var(--red); font-weight: bold; }
        
        .dot::after { content: ""; position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; background: white; border-radius: 50%; box-shadow: 0 0 2px black; z-index: 10; }

        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); padding: 8px; border-radius: 6px; text-align: center; }
        .stat-val { display: block; font-size: 16px; font-weight: bold; }
        .stat-lbl { font-size: 8px; color: #8b949e; text-transform: uppercase; }

        .interval-tag { font-size: 10px; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-left: 4px solid var(--blue); border-radius: 4px; margin-bottom: 6px; line-height: 1.4; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 10px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-save { background: var(--green); color: white; width: 100%; margin-bottom: 10px; }
        .btn-pdf { background: #8250df; color: white; width: 100%; }
        .btn-google { background: #24292f; color: white; width: 100%; }
        
        hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    </style>
</head>
<body data-theme="light">

<div class="sidebar">
    <div id="themeToggle" class="theme-toggle">🌙</div>
    <h2 style="margin-top:0; font-size: 20px;">Férias 2026</h2>
    
    <div id="loginArea">
        <button class="btn-google" id="btnLogin">Entrar com Google</button>
    </div>
    
    <div id="userArea" style="display:none">
        <div id="userName" style="font-weight:bold; margin-bottom:10px; font-size: 15px;"></div>
        
        <div class="stats">
            <div class="stat-box">
                <span id="sTotal" class="stat-val">22</span><span class="stat-lbl">Plafond</span>
                <div style="display:flex; justify-content:center; gap:5px; margin-top:5px;">
                    <button id="btnDec" style="padding:2px 6px; background:var(--border);">-</button>
                    <button id="btnInc" style="padding:2px 6px; background:var(--border);">+</button>
                </div>
            </div>
            <div class="stat-box"><span id="sUsed" class="stat-val">0</span><span class="stat-lbl">Gastos</span></div>
            <div class="stat-box"><span id="sLeft" class="stat-val">22</span><span class="stat-lbl">Sobra</span></div>
        </div>

        <button class="btn-save" id="btnSave">Guardar Alterações</button>
        <button class="btn-pdf" id="btnExport">Gerar PDF</button>
        <div id="msg" style="color:var(--green); font-size:12px; text-align:center; margin-top:8px; font-weight: bold;"></div>
        
        <hr>
        
        <div style="font-size:10px; color:#8b949e; font-weight:bold; margin-bottom:10px; text-transform:uppercase;">Sobra da Equipa:</div>
        <div id="legendArea"></div>
        
        <hr>
        
        <div style="font-size:10px; color:#8b949e; font-weight:bold; margin-bottom:10px; text-transform:uppercase;">Os Meus Períodos:</div>
        <div id="intervalList"></div>
    </div>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let membros = {}, equipaData = {}, myEmail = "", myDates = [];
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-04", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    const isUtil = (dStr) => {
        const [y, m, d] = dStr.split('-').map(Number);
        const dt = new Date(y, m-1, d);
        return dt.getDay() !== 0 && dt.getDay() !== 6 && !FERIADOS.includes(dStr);
    };

    function getIntervals(dates) {
        if(!dates.length) return [];
        const s = [...dates].sort();
        let res = [], start = s[0], end = s[0];
        for(let i=1; i<=s.length; i++){
            const d1 = new Date(s[i-1]), d2 = s[i] ? new Date(s[i]) : null;
            if(d2 && (d2-d1) <= 86400000) end = s[i];
            else {
                const f = (val) => {
                    const [y,m,d] = val.split('-');
                    const wd = new Date(y,m-1,d).toLocaleDateString('pt',{weekday:'short'}).replace('.','');
                    return `${wd} ${d}/${m}`;
                };
                res.push(start === end ? f(start) : `${f(start)} a ${f(end)}`);
                start = s[i]; end = s[i];
            }
        }
        return res;
    }

    onAuthStateChanged(auth, user => {
        if(user) {
            myEmail = user.email.replace(/\./g, '_');
            onValue(ref(db, 'membros'), s => { membros = s.val() || {}; render(); });
            onValue(ref(db, 'equipa'), s => { equipaData = s.val() || {}; myDates = equipaData[myEmail] || []; render(); });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('userArea').style.display = 'block';
        }
    });

    function render() {
        if(!membros[myEmail]) return;
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length:37}, (_,i)=>`<th>${['S','T','Q','Q','S','S','D'][i%7]}</th>`).join('') + "</tr>";
        
        document.getElementById('userName').innerText = "👤 " + (membros[myEmail].nome === "Ines" ? "Inês" : membros[myEmail].nome);
        const total = membros[myEmail].totalDias || 22;
        const gastos = myDates.filter(isUtil).length;
        document.getElementById('sTotal').innerText = total;
        document.getElementById('sUsed').innerText = gastos;
        document.getElementById('sLeft').innerText = total - gastos;

        const leg = document.getElementById('legendArea'); leg.innerHTML = "";
        Object.entries(membros).forEach(([email, m]) => {
            const sobra = (m.totalDias || 22) - (equipaData[email] || []).filter(isUtil).length;
            leg.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:6px;"><span><span style="display:inline-block; width:10px; height:10px; background:${m.cor}; border-radius:2px; margin-right:8px;"></span>${m.nome === 'Ines' ? 'Inês' : m.nome}</span><b>${sobra}</b></div>`;
        });
        document.getElementById('intervalList').innerHTML = getIntervals(myDates).map(i => `<div class="interval-tag">${i}</div>`).join('');

        ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"].forEach((mNome, mIdx) => {
            const row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = mNome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell();
            
            while(d.getMonth() === mIdx) {
                const cell = row.insertCell();
                const dStr = `2026-${String(mIdx+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                cell.innerText = d.getDate(); cell.className = 'day';
                
                const isH = FERIADOS.includes(dStr), dw = d.getDay(), isW = (dw===0||dw===6);
                if(isH) cell.classList.add('holiday');
                if(isW) cell.classList.add('weekend');

                const users = Object.keys(equipaData).filter(e => equipaData[e]?.includes(dStr));
                if(users.length > 0) {
                    cell.style.color = "white";
                    if(isH || isW) cell.classList.add('dot');
                    if(users.length === 1) cell.style.background = membros[users[0]].cor;
                    else if(users.length === 2) cell.style.background = `linear-gradient(135deg, ${membros[users[0]].cor} 50%, ${membros[users[1]].cor} 50%)`;
                    else cell.style.background = `linear-gradient(90deg, ${membros[users[0]].cor} 33%, ${membros[users[1]].cor} 33%, ${membros[users[1]].cor} 66%, ${membros[users[2]].cor} 66%)`;
                }

                cell.onclick = () => {
                    if(myDates.includes(dStr)) myDates = myDates.filter(v => v !== dStr);
                    else {
                        if(isUtil(dStr) && myDates.filter(isUtil).length >= total) return;
                        myDates.push(dStr);
                    }
                    equipaData[myEmail] = myDates; render();
                };
                d.setDate(d.getDate()+1);
            }
            while(row.cells.length < 38) row.insertCell();
        });
    }

    // Botões e Eventos
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnSave').onclick = async () => {
        await set(ref(db, 'equipa/' + myEmail), myDates);
        document.getElementById('msg').innerText = "✅ Guardado!";
        setTimeout(() => document.getElementById('msg').innerText = "", 3000);
    };
    document.getElementById('btnExport').onclick = () => {
        const element = document.getElementById('calendar');
        html2pdf().from(element).set({ margin: 10, filename: 'Ferias_2026.pdf', jsPDF: { orientation: 'landscape' } }).save();
    };
    document.getElementById('btnInc').onclick = () => changePlafond(1);
    document.getElementById('btnDec').onclick = () => changePlafond(-1);
    async function changePlafond(val) {
        const novo = (membros[myEmail]?.totalDias || 22) + val;
        if(novo >= 0) await update(ref(db, 'membros/' + myEmail), { totalDias: novo });
    }
    document.getElementById('themeToggle').onclick = () => {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        document.getElementById('themeToggle').innerText = t === 'dark' ? '☀️' : '🌙';
    };
</script>
</body>
</html>
