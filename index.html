<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias 2026 - Google Login</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --blue: #1f6feb; --green: #238636; --red: #f85149; --orange: #e3b341; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--card); padding: 20px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #0d1117; border-radius: 8px; display: none; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; }
        
        button { cursor: pointer; border-radius: 6px; border: none; padding: 12px; width: 100%; font-weight: bold; color: white; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; }
        .btn-sync { background: var(--blue); }
        .btn-save { background: var(--green); }
        .btn-logout { background: transparent; color: var(--red); font-size: 12px; margin-top: auto; }
        
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        table { border-collapse: collapse; width: 100%; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #30363d; height: 35px; text-align: center; font-size: 11px; }
        .selected { background: var(--blue) !important; color: white; font-weight: bold; }
        .month-name { background: #21262d; text-align: left; padding-left: 12px; font-weight: bold; width: 100px; }
        .day { cursor: pointer; }
        .weekend { color: var(--orange); background: #2d2400; }
        .holiday { color: var(--red); background: #3d1414; }
        #status { font-size: 12px; text-align: center; margin: 10px 0; padding: 8px; border-radius: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin-top:0">🏖️ Férias 2026</h2>
    
    <button id="btnLogin" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar com Google
    </button>

    <div id="userInfo" class="user-info">
        <img id="userImg" src="">
        <span id="userName" style="font-size: 14px;"></span>
    </div>

    <div id="cloudControls" class="hidden">
        <button class="btn-save" id="btnSave">☁️ Guardar Férias</button>
        <div id="status">Sincronizado</div>
    </div>

    <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
    <div style="text-align: center;">
        <div id="count" style="font-size: 48px; font-weight: bold;">0</div>
        <div style="color: #8b949e; font-size: 14px;">Dias Marcados</div>
    </div>

    <button id="btnLogout" class="btn-logout hidden">Sair da Conta</button>
</div>

<div class="main">
    <table id="calendar"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9V2yj_wYiR9o6G-jv-9oxH2Roxb91RPQ",
        authDomain: "vacations-f36d6.firebaseapp.com",
        databaseURL: "https://vacations-f36d6-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "vacations-f36d6",
        storageBucket: "vacations-f36d6.firebasestorage.app",
        messagingSenderId: "842955648867",
        appId: "1:842955648867:web:3c86b22400ec6bd7d2ad56"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let selecionados = [];
    let currentUser = null;

    // --- LÓGICA DO CALENDÁRIO ---
    const FERIADOS = ["2026-01-01", "2026-04-03", "2026-04-25", "2026-05-01", "2026-06-10", "2026-08-15", "2026-10-05", "2026-11-01", "2026-12-01", "2026-12-08", "2026-12-25"];

    function render() {
        const table = document.getElementById('calendar');
        table.innerHTML = "<tr><th>Mês</th>" + Array.from({length: 37}, (_, i) => `<th>${['S','T','Q','Q','S','S','D'][i % 7]}</th>`).join('') + "</tr>";
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        meses.forEach((nome, mIdx) => {
            let row = table.insertRow();
            row.insertCell().className = 'month-name'; row.cells[0].innerText = nome;
            let d = new Date(2026, mIdx, 1);
            let offset = d.getDay() === 0 ? 6 : d.getDay() - 1;
            for(let i=0; i<offset; i++) row.insertCell().className = 'empty';
            while(d.getMonth() === mIdx) {
                let cell = row.insertCell();
                let dStr = d.toISOString().split('T')[0];
                cell.innerText = d.getDate();
                cell.className = 'day';
                if (FERIADOS.includes(dStr)) cell.classList.add('holiday');
                else if (d.getDay() === 0 || d.getDay() === 6) cell.classList.add('weekend');
                if (selecionados.includes(dStr)) cell.classList.add('selected');
                cell.onclick = () => {
                    if (selecionados.includes(dStr)) selecionados = selecionados.filter(item => item !== dStr);
                    else selecionados.push(dStr);
                    render();
                    document.getElementById('status').innerText = "⚠️ Alterações por guardar";
                };
                d.setDate(d.getDate() + 1);
            }
        });
        document.getElementById('count').innerText = selecionados.length;
    }

    // --- AUTENTICAÇÃO E NUVEM ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('btnLogin').classList.add('hidden');
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('cloudControls').classList.remove('hidden');
            document.getElementById('btnLogout').classList.remove('hidden');
            document.getElementById('userName').innerText = user.displayName.split(' ')[0];
            document.getElementById('userImg').src = user.photoURL;
            
            // Carregar dados automaticamente ao entrar
            const snapshot = await get(ref(db, 'users/' + user.uid));
            selecionados = snapshot.val() || [];
            render();
            document.getElementById('status').innerText = "✅ Dados carregados";
        } else {
            currentUser = null;
            selecionados = [];
            render();
            document.getElementById('btnLogin').classList.remove('hidden');
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('cloudControls').classList.add('hidden');
            document.getElementById('btnLogout').classList.add('hidden');
        }
    });

    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);

    document.getElementById('btnSave').onclick = async () => {
        if (!currentUser) return;
        document.getElementById('status').innerText = "⏳ A guardar...";
        await set(ref(db, 'users/' + currentUser.uid), selecionados);
        document.getElementById('status').innerText = "✅ Guardado com sucesso!";
    };

    render();
</script>
</body>
</html>
